<head>

  <title>Manga</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">
    <img src="logo.png.jpeg" alt="Hikari Anime logo" class="logo-img">
  </a>

  <div class="nav-links">
    <a href="index.html" data-i18n="nav.home">Home</a>
    <a href="trending.html" data-i18n="nav.trending">Trending 🔥</a>

<section class="top-tools">
  <input id="searchManga" data-i18n-placeholder="manga.search" placeholder="Search manga..." />
</section>

  <div class="genre-header">
    <span class="genre-title">Genres</span>
    <button type="button" class="genre-clear" id="clearMangaGenreBtn" hidden>Clear</button>
  </div>
  <div class="genre-chips" id="mangaGenreChips" role="list"></div>
</section>

<section class="grid" id="mangaGrid"></section>

<script src="app.js"></script>
