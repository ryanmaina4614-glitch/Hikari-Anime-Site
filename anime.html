<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime | Hikari</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Noto+Sans+JP&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">
    <img src="logo.png.jpeg" alt="Hikari Anime logo" class="logo-img">
  </a>

  <div class="nav-links">
    <a href="index.html" data-i18n="nav.home">Home</a>
    <a href="trending.html" data-i18n="nav.trending">Trending 🔥</a>
    <a href="upcoming.html" data-i18n="nav.upcoming">Upcoming ⏳</a>
    <a href="anime.html" data-i18n="nav.anime">Anime 🎬</a>
    <a href="manga.html" data-i18n="nav.manga">Manga 📚</a>
    <a href="favorites.html" data-i18n="nav.favorites">Favorites ⭐</a>
    <a href="login.html" data-i18n="nav.login">Login</a>
    <a href="signup.html" data-i18n="nav.signup">Sign Up</a>
    <a href="settings.html" data-i18n="nav.settings">Settings</a>
  </div>
</nav>

<section class="top-tools">
  <input id="search" data-i18n-placeholder="anime.search" placeholder="Search anime..." />
  <button onclick="toggleLearningMode()" data-i18n="anime.learningModeButton">🇯🇵 Learning Mode</button>
</section>

<section class="genre-tools" aria-label="Filter by genre">
  <div class="genre-header">
    <span class="genre-title">Genres</span>
    <button type="button" class="genre-clear" id="clearGenreBtn" hidden>Clear</button>
  </div>
  <div class="genre-chips" id="genreChips" role="list"></div>
</section>

<header class="hero" id="hero">
  <div class="hero-content">
    <h2>Loading...</h2>
  </div>
</header>

<section class="grid" id="grid"></section>

<script src="app.js"></script>
</body>
</html>
